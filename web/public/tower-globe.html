<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>MetGate · Tour Globe Tactique 3D</title>
<meta name="viewport" content="width=1920">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #020617; color: #e2e8f0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; }

  .header { position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(2,6,23,0.85), transparent);
    pointer-events: none;
  }
  .header .nav { display: flex; gap: 4px; pointer-events: auto; }
  .header .nav a, .header .nav span {
    padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #94a3b8;
    text-decoration: none;
  }
  .header .nav .active { background: #1e293b; color: #67e8f9; border: 1px solid #334155; }

  .hud-tl { position: fixed; top: 60px; left: 24px; z-index: 10;
    padding: 10px 14px; border-radius: 10px; background: rgba(2,6,23,0.78); backdrop-filter: blur(8px);
    border: 1px solid #1e293b; min-width: 240px;
  }
  .hud-tl h2 { margin: 0 0 6px; font-size: 11px; color: #67e8f9; text-transform: uppercase; letter-spacing: 0.1em; }
  .hud-tl select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 100%; }

  .hud-tr { position: fixed; top: 60px; right: 24px; z-index: 10;
    padding: 10px 14px; border-radius: 10px; background: rgba(127,29,29,0.4);
    border: 1px solid rgba(239,68,68,0.5); backdrop-filter: blur(8px);
    max-width: 280px;
  }
  .hud-tr h2 { margin: 0 0 4px; font-size: 11px; color: #fecaca; text-transform: uppercase; letter-spacing: 0.1em; }
  .hud-tr ul { margin: 0; padding: 0; list-style: none; font-size: 11px; color: #fed7d7; }
  .hud-tr li { padding: 2px 0; }

  .hud-br { position: fixed; bottom: 24px; right: 24px; z-index: 10;
    padding: 10px 14px; border-radius: 10px; background: rgba(2,6,23,0.78); backdrop-filter: blur(8px);
    border: 1px solid #1e293b; display: flex; flex-direction: column; gap: 6px; min-width: 260px;
  }
  .hud-br .row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .hud-br input[type=range] { flex: 1; accent-color: #a78bfa; }

  .hud-bl { position: fixed; bottom: 24px; left: 24px; z-index: 10;
    padding: 8px 12px; border-radius: 10px; background: rgba(2,6,23,0.78); backdrop-filter: blur(8px);
    border: 1px solid #1e293b; display: flex; gap: 8px; align-items: center;
    font-size: 11px; color: #cbd5e1;
  }
  .hud-bl .btn {
    width: 32px; height: 32px; border-radius: 6px; background: #0f172a; border: 1px solid #334155;
    color: #cbd5e1; cursor: pointer; font-family: inherit; font-size: 14px;
  }
  .hud-bl .btn:hover { background: #1e293b; }
  .hud-bl .group { display: flex; gap: 4px; align-items: center; }
  .hud-bl .label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; }

  .help { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10;
    padding: 6px 14px; border-radius: 999px; background: rgba(2,6,23,0.7); backdrop-filter: blur(8px);
    border: 1px solid #1e293b; font-size: 10px; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.15em;
  }
  .help kbd { background: #0f172a; padding: 1px 6px; border-radius: 3px; font-family: ui-monospace, monospace; color: #67e8f9; border: 1px solid #334155; }

  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<div class="header">
  <div style="display:flex; align-items:center; gap:10px; pointer-events:auto;">
    <div style="width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg, #22d3ee, #2563eb); display:flex; align-items:center; justify-content:center; color:#020617; font-weight:700;">M</div>
    <div>
      <div style="font-size:14px;">MetGate Portal</div>
      <div style="font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:0.12em;">Tour Globe 3D · LFPG</div>
    </div>
  </div>
  <nav class="nav">
    <a href="/" >Catalogue</a>
    <a href="/" >Carte</a>
    <span class="active">Tour 3D</span>
  </nav>
</div>

<div class="hud-tl">
  <h2>Aéroport</h2>
  <select>
    <option>LFPG · Paris CDG</option>
    <option>LFPO · Paris ORY</option>
    <option>LFBO · Toulouse</option>
    <option>LFML · Marseille</option>
  </select>
  <div style="margin-top:6px; font-size:10px; color:#64748b;" class="mono">UTC 14:32 · METAR -2 min</div>
</div>

<div class="hud-tr">
  <h2>⚠ Alertes actives</h2>
  <ul>
    <li><b style="color:#fecaca;">Cb FL420</b> finale 27L</li>
    <li><b style="color:#fed7aa;">Foudre</b> 8 NM SE · 24/10 min</li>
    <li><b style="color:#ddd6fe;">SIGMET</b> SEV TURB FL250-400</li>
  </ul>
</div>

<div class="hud-br">
  <div class="row">
    <span style="color:#a78bfa; text-transform:uppercase; letter-spacing:0.1em; font-size:10px;">Filtre FL</span>
    <input type="range" id="flSlider" min="0" max="500" value="0" step="50">
    <span class="mono" style="color:#c4b5fd; width:48px; text-align:right;" id="flValue">FL000</span>
  </div>
  <div class="row" style="border-top:1px solid #1e293b; padding-top:6px;">
    <label style="display:flex; align-items:center; gap:6px; font-size:10px; color:#94a3b8;">
      <input type="checkbox" id="toggleTropo" checked> tropopause
    </label>
    <label style="display:flex; align-items:center; gap:6px; font-size:10px; color:#94a3b8;">
      <input type="checkbox" id="toggleWind" checked> vents FL
    </label>
    <label style="display:flex; align-items:center; gap:6px; font-size:10px; color:#94a3b8;">
      <input type="checkbox" id="toggleLightning" checked> foudre
    </label>
  </div>
</div>

<div class="hud-bl">
  <div class="group">
    <span class="label">Caméra</span>
  </div>
  <div class="group">
    <button class="btn" onclick="resetCamera()" title="Reset">⟲</button>
    <button class="btn" onclick="topView()" title="Vue dessus">⊥</button>
    <button class="btn" onclick="sideView()" title="Vue côté">→</button>
  </div>
  <div class="group" style="border-left:1px solid #1e293b; padding-left:8px;">
    <button class="btn" onclick="zoomIn()" title="Zoom +">+</button>
    <button class="btn" onclick="zoomOut()" title="Zoom −">−</button>
  </div>
</div>

<div class="help">
  Drag : <kbd>orbit</kbd> · Molette : <kbd>zoom</kbd> · Maj+drag : <kbd>pan</kbd>
</div>

<!-- Three.js modules importmap (CDN) -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ───────────────────────────────────────────────────────────────────────
// Scène
// ───────────────────────────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap')
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.outputColorSpace = THREE.SRGBColorSpace
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.1
wrap.appendChild(renderer.domElement)

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x020617)
scene.fog = new THREE.Fog(0x020617, 60, 220)

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000)
camera.position.set(35, 28, 35)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.08
controls.minDistance = 12
controls.maxDistance = 90
controls.maxPolarAngle = Math.PI * 0.49 // ne pas passer sous le sol
controls.target.set(0, 5, 0)

// Lumières
scene.add(new THREE.AmbientLight(0x6080a0, 0.45))
const sun = new THREE.DirectionalLight(0xfff2d0, 1.2)
sun.position.set(40, 60, 30)
sun.castShadow = false
scene.add(sun)
const fill = new THREE.DirectionalLight(0x88aaff, 0.4)
fill.position.set(-30, 40, -30)
scene.add(fill)

// Étoiles d'arrière-plan (effet ciel nocturne hors globe)
const starGeo = new THREE.BufferGeometry()
const starPositions = []
for (let i = 0; i < 600; i++) {
  const r = 250 + Math.random() * 50
  const phi = Math.random() * Math.PI * 2
  const theta = Math.random() * Math.PI
  starPositions.push(
    r * Math.sin(theta) * Math.cos(phi),
    r * Math.cos(theta),
    r * Math.sin(theta) * Math.sin(phi),
  )
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3))
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x88aacc, size: 0.5, sizeAttenuation: true })))

// ───────────────────────────────────────────────────────────────────────
// La boule à neige : socle + dôme verre + base sol
// ───────────────────────────────────────────────────────────────────────
const RADIUS = 22 // rayon utile du dôme

// Socle bois sombre / métal
const baseGeo = new THREE.CylinderGeometry(RADIUS * 1.05, RADIUS * 1.15, 4, 64)
const baseMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.6, metalness: 0.7 })
const base = new THREE.Mesh(baseGeo, baseMat)
base.position.y = -2
scene.add(base)
// Anneau de socle (chrome)
const ringGeo = new THREE.TorusGeometry(RADIUS * 1.06, 0.5, 16, 64)
const ringMat = new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.2, metalness: 0.95 })
const ring = new THREE.Mesh(ringGeo, ringMat)
ring.rotation.x = Math.PI / 2
ring.position.y = 0
scene.add(ring)

// Sol intérieur (carte stylisée)
const groundGeo = new THREE.CircleGeometry(RADIUS, 64)
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a1628, roughness: 0.85, metalness: 0,
})
const ground = new THREE.Mesh(groundGeo, groundMat)
ground.rotation.x = -Math.PI / 2
ground.position.y = 0.05
scene.add(ground)

// Anneaux radiaux (NM) sur le sol
for (const r of [5, 10, 15, 20]) {
  const k = (r / 25) * RADIUS
  const ringGeom = new THREE.RingGeometry(k - 0.05, k + 0.05, 64)
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x334155, transparent: true, opacity: 0.5 })
  const ring = new THREE.Mesh(ringGeom, ringMat)
  ring.rotation.x = -Math.PI / 2
  ring.position.y = 0.06
  scene.add(ring)
}

// Verre du dôme (boule à neige)
const domeGeo = new THREE.SphereGeometry(RADIUS, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2)
const domeMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 0.92,
  opacity: 1.0,
  roughness: 0.05,
  metalness: 0,
  clearcoat: 1,
  clearcoatRoughness: 0.06,
  ior: 1.45,
  thickness: 0.3,
  transparent: true,
  side: THREE.DoubleSide,
  envMapIntensity: 1,
})
const dome = new THREE.Mesh(domeGeo, domeMat)
scene.add(dome)

// Anneau de jointure verre / socle
const joint = new THREE.Mesh(
  new THREE.TorusGeometry(RADIUS, 0.15, 16, 64),
  new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.3, metalness: 0.8 }),
)
joint.rotation.x = Math.PI / 2
joint.position.y = 0.05
scene.add(joint)

// ───────────────────────────────────────────────────────────────────────
// Aéroport au centre : pistes 27L/27R + label LFPG
// ───────────────────────────────────────────────────────────────────────
const apGroup = new THREE.Group()
scene.add(apGroup)
// Pistes : 2 rectangles parallèles (orientation E-W approx pour 27L/27R)
function makeRunway(z) {
  const g = new THREE.PlaneGeometry(8, 0.7)
  const m = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.9, emissive: 0x1e293b })
  const r = new THREE.Mesh(g, m)
  r.rotation.x = -Math.PI / 2
  r.position.set(0, 0.07, z)
  return r
}
apGroup.add(makeRunway(-0.7))
apGroup.add(makeRunway(0.7))

// Marqueur lumineux centre
const beacon = new THREE.Mesh(
  new THREE.CylinderGeometry(0.25, 0.4, 1.2, 16),
  new THREE.MeshStandardMaterial({ color: 0x22d3ee, emissive: 0x0891b2, emissiveIntensity: 1 }),
)
beacon.position.set(0, 0.6, 0)
apGroup.add(beacon)

// ───────────────────────────────────────────────────────────────────────
// Tropopause (calotte semi-transparente)
// ───────────────────────────────────────────────────────────────────────
const tropoGeo = new THREE.CircleGeometry(RADIUS * 0.9, 64)
const tropoMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
const tropo = new THREE.Mesh(tropoGeo, tropoMat)
tropo.rotation.x = -Math.PI / 2
tropo.position.y = 14 // FL370 ~ 14 unités à l'échelle
scene.add(tropo)

// Bord de la tropopause
const tropoEdgeGeo = new THREE.RingGeometry(RADIUS * 0.89, RADIUS * 0.9, 64)
const tropoEdgeMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
const tropoEdge = new THREE.Mesh(tropoEdgeGeo, tropoEdgeMat)
tropoEdge.rotation.x = -Math.PI / 2
tropoEdge.position.y = 14
scene.add(tropoEdge)

// ───────────────────────────────────────────────────────────────────────
// Cellules orageuses (cylindres dégradés)
// ───────────────────────────────────────────────────────────────────────
const cellsGroup = new THREE.Group()
scene.add(cellsGroup)
const cellsData = [
  { x: 9, z: 6, top: 16.8, fl: 420, color: 0xef4444, label: 'Cb FL420' },     // Cellule majeure SE
  { x: -8, z: -3, top: 11.2, fl: 280, color: 0x4ade80, label: 'TCU FL280' },  // TCU O
  { x: 4, z: -10, top: 7, fl: 175, color: 0x67e8f9, label: 'Cu FL175' },      // Cumulus N
  { x: -12, z: 9, top: 18.5, fl: 460, color: 0xdc2626, label: 'Cb FL460' },   // Cellule majeure SW (overshoot tropo)
]
function makeCell(d) {
  const g = new THREE.Group()
  const segs = 8
  for (let i = 0; i < segs; i++) {
    const t = i / (segs - 1)
    const r = 1.4 + t * 0.4 + Math.sin(t * Math.PI) * 0.4
    const seg = new THREE.Mesh(
      new THREE.SphereGeometry(r, 16, 12),
      new THREE.MeshStandardMaterial({
        color: d.color,
        emissive: d.color,
        emissiveIntensity: 0.15 + t * 0.25,
        roughness: 0.85,
        transparent: true,
        opacity: 0.78,
      }),
    )
    seg.position.set(0, (t * d.top) + 0.6, 0)
    g.add(seg)
  }
  g.position.set(d.x, 0, d.z)
  g.userData = { fl: d.fl, label: d.label }

  // Label flottant en sprite (canvas 2D → texture)
  const cvs = document.createElement('canvas')
  cvs.width = 256; cvs.height = 64
  const ctx = cvs.getContext('2d')
  ctx.fillStyle = 'rgba(15,23,42,0.85)'
  ctx.fillRect(0, 0, cvs.width, cvs.height)
  ctx.strokeStyle = '#475569'; ctx.lineWidth = 2; ctx.strokeRect(1, 1, cvs.width - 2, cvs.height - 2)
  ctx.font = 'bold 28px ui-monospace, monospace'
  ctx.fillStyle = '#fecaca'
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText(d.label, cvs.width / 2, cvs.height / 2)
  const tex = new THREE.CanvasTexture(cvs)
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }))
  sprite.position.set(0, d.top + 1.6, 0)
  sprite.scale.set(4, 1, 1)
  g.add(sprite)

  return g
}
cellsData.forEach((d) => cellsGroup.add(makeCell(d)))

// ───────────────────────────────────────────────────────────────────────
// Foudre (sprites lumineux clignotants)
// ───────────────────────────────────────────────────────────────────────
const lightningGroup = new THREE.Group()
scene.add(lightningGroup)
const lightningData = [
  { x: 9.3, y: 8, z: 5.5 },
  { x: 8.5, y: 12, z: 6.5 },
  { x: -11.5, y: 14, z: 9.2 },
  { x: -12.5, y: 7, z: 8.5 },
  { x: 9.8, y: 5, z: 7 },
]
const flashTexture = (() => {
  const cvs = document.createElement('canvas')
  cvs.width = 64; cvs.height = 64
  const ctx = cvs.getContext('2d')
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32)
  grad.addColorStop(0, 'rgba(254,243,199,1)')
  grad.addColorStop(0.3, 'rgba(252,211,77,0.85)')
  grad.addColorStop(0.7, 'rgba(252,211,77,0.2)')
  grad.addColorStop(1, 'rgba(252,211,77,0)')
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, 64, 64)
  return new THREE.CanvasTexture(cvs)
})()
lightningData.forEach((p) => {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: flashTexture, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }))
  s.position.set(p.x, p.y, p.z)
  s.scale.set(3, 3, 1)
  s.userData.phase = Math.random() * Math.PI * 2
  lightningGroup.add(s)
})

// ───────────────────────────────────────────────────────────────────────
// Vents en altitude (flèches 3D à plusieurs niveaux)
// ───────────────────────────────────────────────────────────────────────
const windGroup = new THREE.Group()
scene.add(windGroup)
const windData = [
  { y: 2, dir: 270, kt: 15, color: 0x67e8f9, fl: 'FL050' },
  { y: 4, dir: 260, kt: 35, color: 0x67e8f9, fl: 'FL100' },
  { y: 9, dir: 280, kt: 75, color: 0xfbbf24, fl: 'FL250' },
  { y: 14.5, dir: 270, kt: 110, color: 0xef4444, fl: 'FL400' },
]
windData.forEach((w) => {
  // 3 flèches autour de l'aéroport pour matérialiser un "champ" de vent
  for (let i = 0; i < 3; i++) {
    const ang = (i / 3) * Math.PI * 2 + Math.PI / 6
    const r = RADIUS * 0.65
    const x = Math.cos(ang) * r
    const z = Math.sin(ang) * r
    const length = Math.min(8, 2 + w.kt / 18)
    const dirRad = ((w.dir + 90) * Math.PI) / 180
    const dx = Math.sin(dirRad)
    const dz = Math.cos(dirRad)
    const arrow = new THREE.ArrowHelper(
      new THREE.Vector3(dx, 0, dz),
      new THREE.Vector3(x, w.y, z),
      length,
      w.color,
      length * 0.25,
      length * 0.18,
    )
    windGroup.add(arrow)
  }
})

// ───────────────────────────────────────────────────────────────────────
// Aérodromes voisins (markers + labels)
// ───────────────────────────────────────────────────────────────────────
const adData = [
  { name: 'LFPB', x: -7, z: 4 },
  { name: 'LFPV', x: 11, z: -3 },
  { name: 'LFOL', x: -14, z: -6 },
]
function makeADMarker(d) {
  const g = new THREE.Group()
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 16, 12),
    new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x0284c7, emissiveIntensity: 1 }),
  )
  g.add(dot)

  const cvs = document.createElement('canvas')
  cvs.width = 128; cvs.height = 32
  const ctx = cvs.getContext('2d')
  ctx.font = 'bold 22px ui-monospace, monospace'
  ctx.fillStyle = '#cbd5e1'
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText(d.name, cvs.width / 2, cvs.height / 2)
  const tex = new THREE.CanvasTexture(cvs)
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }))
  sprite.position.set(0, 1, 0)
  sprite.scale.set(2.5, 0.6, 1)
  g.add(sprite)

  g.position.set(d.x, 0.3, d.z)
  return g
}
adData.forEach((d) => scene.add(makeADMarker(d)))

// ───────────────────────────────────────────────────────────────────────
// Avion ADS-B en finale (silhouette)
// ───────────────────────────────────────────────────────────────────────
const planeGroup = new THREE.Group()
const planeBody = new THREE.Mesh(
  new THREE.ConeGeometry(0.3, 1.2, 4),
  new THREE.MeshStandardMaterial({ color: 0x22d3ee, emissive: 0x0891b2, emissiveIntensity: 0.5 }),
)
planeBody.rotation.x = -Math.PI / 2
planeGroup.add(planeBody)
const wing = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.08, 0.4),
  new THREE.MeshStandardMaterial({ color: 0x22d3ee }),
)
planeGroup.add(wing)
planeGroup.position.set(8, 1.5, -1)
planeGroup.rotation.y = -Math.PI / 4
scene.add(planeGroup)

// ───────────────────────────────────────────────────────────────────────
// Animation
// ───────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
function animate() {
  const t = clock.getElapsedTime()
  // Foudre clignotante
  lightningGroup.children.forEach((s) => {
    const phase = s.userData.phase
    const intensity = 0.3 + 0.7 * Math.max(0, Math.sin(t * 2.5 + phase) * Math.sin(t * 7 + phase * 3))
    s.material.opacity = intensity
    const k = 2 + 1.5 * intensity
    s.scale.set(k, k, 1)
  })
  // Beacon pulsant
  beacon.material.emissiveIntensity = 0.6 + 0.4 * Math.sin(t * 2)

  controls.update()
  renderer.render(scene, camera)
  requestAnimationFrame(animate)
}
animate()

// ───────────────────────────────────────────────────────────────────────
// Resize + UI
// ───────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth, window.innerHeight)
})

// Slider FL : masque les cellules dont le sommet est en dessous
const flSlider = document.getElementById('flSlider')
const flValue = document.getElementById('flValue')
flSlider.addEventListener('input', () => {
  const minFL = +flSlider.value
  flValue.textContent = 'FL' + String(minFL).padStart(3, '0')
  cellsGroup.children.forEach((c) => {
    c.visible = c.userData.fl >= minFL
  })
})

document.getElementById('toggleTropo').addEventListener('change', (e) => {
  tropo.visible = e.target.checked; tropoEdge.visible = e.target.checked
})
document.getElementById('toggleWind').addEventListener('change', (e) => {
  windGroup.visible = e.target.checked
})
document.getElementById('toggleLightning').addEventListener('change', (e) => {
  lightningGroup.visible = e.target.checked
})

// Boutons caméra
window.resetCamera = () => {
  camera.position.set(35, 28, 35)
  controls.target.set(0, 5, 0)
}
window.topView = () => {
  camera.position.set(0.01, 60, 0.01)
  controls.target.set(0, 5, 0)
}
window.sideView = () => {
  camera.position.set(50, 8, 0)
  controls.target.set(0, 5, 0)
}
window.zoomIn = () => {
  camera.position.multiplyScalar(0.85)
}
window.zoomOut = () => {
  camera.position.multiplyScalar(1.18)
}
</script>
</body>
</html>
